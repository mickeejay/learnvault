openapi: 3.0.3
info:
  title: LearnVault API
  version: 1.0.0
  description: Backend API for LearnVault frontend and integrations.
servers:
  - url: http://localhost:4000
    description: Local development server
tags:
  - name: Health
    description: Server status endpoints
  - name: Auth
    description: Wallet authentication endpoints
  - name: Courses
    description: Course catalog endpoints
  - name: Enrollments
    description: Course enrollment endpoints
  - name: Governance
    description: Governance proposal endpoints
  - name: Scholarships
    description: Scholarship application endpoints
  - name: Scholars
    description: Scholar leaderboard endpoints
  - name: Validator
    description: Milestone validation endpoints
  - name: Admin
    description: Admin milestone management endpoints
  - name: Credentials
    description: Scholar credential endpoints
  - name: Events
    description: Event stream endpoints
  - name: Leaderboard
    description: Learner ranking endpoints
  - name: Comments
    description: Proposal comment endpoints
  - name: Treasury
    description: Treasury statistics and activity endpoints
  - name: Upload
    description: IPFS file upload endpoints
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        level:
          type: string
        published:
          type: boolean
      required:
        - id
        - title
        - level
        - published
    Event:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        entityId:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - type
        - entityId
        - timestamp
    ValidatorRequest:
      type: object
      properties:
        courseId:
          type: string
        learnerAddress:
          type: string
        milestoneId:
          type: integer
          minimum: 0
      required:
        - courseId
        - learnerAddress
        - milestoneId
    ValidatorResult:
      allOf:
        - $ref: "#/components/schemas/ValidatorRequest"
        - type: object
          properties:
            approved:
              type: boolean
            validator:
              type: string
          required:
            - approved
            - validator
    Proposal:
      type: object
      properties:
        id:
          type: integer
        author_address:
          type: string
          example: GABCD123456789...
        title:
          type: string
        description:
          type: string
        amount:
          type: number
        votes_for:
          type: integer
        votes_against:
          type: integer
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        cancelled:
          type: boolean
        deadline:
          type: string
          format: date-time
      required:
        - id
        - author_address
        - title
        - status
    ScholarRanking:
      type: object
      properties:
        rank:
          type: integer
        address:
          type: string
        lrn_balance:
          type: number
        courses_completed:
          type: integer
      required:
        - rank
        - address
        - lrn_balance
        - courses_completed
    ScholarshipApplication:
      type: object
      properties:
        applicant_address:
          type: string
          minLength: 50
          maxLength: 56
        full_name:
          type: string
          minLength: 2
        course_id:
          type: string
          minLength: 2
        motivation:
          type: string
          minLength: 10
        evidence_url:
          type: string
          format: uri
        amount:
          type: number
          description: "Requested USDC amount (default: 1000)"
      required:
        - applicant_address
        - full_name
        - course_id
        - motivation
        - evidence_url
    CourseDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        coverImage:
          type: string
          nullable: true
        track:
          type: string
        difficulty:
          type: string
          enum:
            - beginner
            - intermediate
            - advanced
        published:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - title
        - track
        - difficulty
        - published
    Lesson:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        content:
          type: string
        order:
          type: integer
        quiz:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              options:
                type: array
                items:
                  type: string
              correctIndex:
                type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - courseId
        - title
        - content
        - order
    GovernanceProposalInput:
      type: object
      properties:
        author_address:
          type: string
          minLength: 50
          maxLength: 56
          example: GABCD123456789...
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
          minLength: 10
        requested_amount:
          type: string
          pattern: ^\d+(\.\d+)?$
          description: Numeric string representing requested USDC amount
        evidence_url:
          type: string
          format: uri
      required:
        - author_address
        - title
        - description
        - requested_amount
        - evidence_url
    GovernanceProposalCreated:
      type: object
      properties:
        proposal_id:
          type: integer
        tx_hash:
          type: string
      required:
        - proposal_id
        - tx_hash
    VotingPower:
      type: object
      properties:
        address:
          type: string
          example: GABCD123456789...
        gov_balance:
          type: string
          description: Raw governance token balance
        formatted:
          type: string
          description: Human-readable balance
          example: "100.50"
        can_vote:
          type: boolean
      required:
        - address
        - gov_balance
        - formatted
        - can_vote
    ScholarProfile:
      type: object
      properties:
        address:
          type: string
        lrn_balance:
          type: string
          description: Raw LRN token balance
        enrolled_courses:
          type: array
          items:
            type: string
        completed_milestones:
          type: integer
        pending_milestones:
          type: integer
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/Credential"
        joined_at:
          type: string
          format: date-time
      required:
        - address
        - lrn_balance
        - enrolled_courses
        - completed_milestones
        - pending_milestones
        - credentials
        - joined_at
    ScholarMilestone:
      type: object
      properties:
        id:
          type: string
        course_id:
          type: string
        milestone_id:
          type: integer
        status:
          type: string
          enum:
            - pending
            - verified
            - rejected
        evidence_url:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        tx_hash:
          type: string
          nullable: true
      required:
        - id
        - course_id
        - milestone_id
        - status
    Credential:
      type: object
      properties:
        token_id:
          type: integer
        course_id:
          type: string
        course_title:
          type: string
        issued_at:
          type: string
          format: date-time
        metadata_uri:
          type: string
        revoked:
          type: boolean
      required:
        - token_id
        - course_id
        - course_title
        - issued_at
        - metadata_uri
        - revoked
    CourseImportRow:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        track:
          type: string
        difficulty:
          type: string
        description:
          type: string
          nullable: true
        coverImage:
          type: string
          nullable: true
        published:
          type: boolean
      required:
        - title
        - slug
        - track
        - difficulty
    UserProfile:
      type: object
      properties:
        address:
          type: string
        display_name:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        twitter:
          type: string
          nullable: true
        github:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - address
    ProfileStats:
      type: object
      properties:
        lrn_balance:
          type: string
        enrolled_courses:
          type: array
          items:
            type: string
        completed_milestones:
          type: integer
        pending_milestones:
          type: integer
  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
paths:
  /api/admin/milestones/pending:
    get:
      tags:
        - Admin
      summary: List all unverified milestone reports
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pending milestone reports
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/milestones/{id}:
    get:
      tags:
        - Admin
      summary: Get milestone report details and evidence
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Milestone report with audit log
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/admin/milestones/{id}/approve:
    post:
      tags:
        - Admin
      summary: Approve a milestone report and trigger contract call
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Milestone approved
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Report already processed
  /api/admin/milestones/{id}/reject:
    post:
      tags:
        - Admin
      summary: Reject a milestone report with a reason
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Milestone rejected
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Report already processed
  /api/milestones/submit:
    post:
      tags:
        - Milestones
      summary: Scholar submits a milestone report
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scholarAddress
                - course_id
                - milestone_id
              properties:
                scholarAddress:
                  type: string
                course_id:
                  type: string
                milestone_id:
                  type: integer
                evidenceGitHub:
                  type: string
                evidenceIpfsCid:
                  type: string
                evidenceDescription:
                  type: string
      responses:
        "201":
          description: Report submitted
        "400":
          $ref: "#/components/responses/BadRequestError"
        "409":
          description: Report already submitted for this milestone
        "429":
          description: Rate limit exceeded
  /api/admin/courses/bulk-import:
    post:
      summary: Bulk import courses for admin users
      tags:
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    courses:
                      type: array
                      items:
                        $ref: "#/components/schemas/CourseImportRow"
                    preview:
                      type: boolean
                - type: object
                  properties:
                    csv:
                      type: string
                      description: CSV payload with headers
                    preview:
                      type: boolean
          text/csv:
            schema:
              type: string
            example: >
              title,slug,track,difficulty,description,coverImage,published

              Stellar Basics,stellar-basics,Beginner,Beginner,"A starter
              course",,true
      responses:
        "200":
          description: Bulk import preview or confirmation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  imported:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        row:
                          type: integer
                        slug:
                          type: string
                        success:
                          type: boolean
                        errors:
                          type: array
                          items:
                            type: string
                        course:
                          type: object
                          nullable: true
  /api/me/bookmarks:
    get:
      tags:
        - Bookmarks
      summary: List the authenticated learner's bookmarked courses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bookmarks fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        bookmark_id:
                          type: integer
                        course_id:
                          type: string
                        created_at:
                          type: string
                          format: date-time
        "401":
          description: Unauthorized
    post:
      tags:
        - Bookmarks
      summary: Bookmark a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        "200":
          description: Bookmark already existed (idempotent)
        "201":
          description: Bookmark created
        "400":
          description: Validation error
        "401":
          description: Unauthorized
  /api/me/bookmarks/{courseId}:
    delete:
      tags:
        - Bookmarks
      summary: Remove a bookmark (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Bookmark removed (or did not exist)
        "400":
          description: Validation error
        "401":
          description: Unauthorized
  /api/proposals/{proposalId}/comments:
    get:
      summary: Fetch comments for a proposal
      tags:
        - Comments
      parameters:
        - in: path
          name: proposalId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of comments
  /api/comments:
    post:
      summary: Post a new comment
      tags:
        - Comments
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Comment created
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          description: Rate limited
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/comments/{id}:
    delete:
      summary: Delete own comment (soft delete)
      tags:
        - Comments
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/comments/{id}/vote:
    put:
      summary: Upvote or downvote a comment
      tags:
        - Comments
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - upvote
                    - downvote
      responses:
        "200":
          description: Vote recorded
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/comments/{id}/pin:
    put:
      summary: Pin a comment (proposal author only)
      tags:
        - Comments
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pinned
              properties:
                pinned:
                  type: boolean
      responses:
        "200":
          description: Pin updated
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/credentials/{address}:
    get:
      tags:
        - Credentials
      summary: List credentials for a learner address
      description: Returns all ScholarNFT credentials minted for the provided Stellar
        address, including revoked items.
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
          description: Scholar's Stellar wallet address
      responses:
        "200":
          description: Credentials fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        token_id:
                          type: integer
                          example: 1
                        course_id:
                          type: string
                          example: stellar-basics
                        metadata_uri:
                          type: string
                          nullable: true
                          example: ipfs://bafkrei...
                        minted_at:
                          type: string
                          format: date-time
                          example: 2026-03-26T10:30:00Z
                        revoked:
                          type: boolean
                          example: false
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/credentials/metadata:
    post:
      tags:
        - Credentials
      summary: Generate and upload NFT metadata for a course completion credential
      description: |
        Creates ERC-721/ERC-1155 compliant metadata for a ScholarNFT credential,
        uploads it to IPFS via Pinata, and returns the ipfs:// URI for use in
        scholar_nft.mint().
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
                - learner_address
                - completed_at
              properties:
                course_id:
                  type: string
                  description: Course identifier (e.g., "stellar-basics")
                  example: stellar-basics
                learner_address:
                  type: string
                  description: Stellar address of the learner
                  example: GABC123...XYZ789
                completed_at:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp of course completion
                  example: 2026-03-26T10:30:00Z
      responses:
        "201":
          description: Metadata created and uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      metadata_uri:
                        type: string
                        description: IPFS URI for use in scholar_nft.mint()
                        example: ipfs://bafkreiabcdef1234567890ghijklmnopqrstuvwxyz
                      gateway_url:
                        type: string
                        description: HTTP gateway URL for viewing metadata
                        example: https://gateway.pinata.cloud/ipfs/bafkreiabcdef1234567890ghijklmnopqrstuvwxyz
                      metadata:
                        type: object
                        description: The generated metadata object
                        properties:
                          name:
                            type: string
                            example: Introduction to Stellar & Soroban — Course Completion
                          description:
                            type: string
                            example: Issued to learners who complete all milestones in Introduction to
                              Stellar & Soroban
                          image:
                            type: string
                            example: ipfs://bafybeigdyrzt5sfp7udm7hu76uh7y26nf3efuylqabf3oclgtqy55fbzdi
                          attributes:
                            type: array
                            items:
                              type: object
                              properties:
                                trait_type:
                                  type: string
                                value:
                                  type: string
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Course not found
                  message:
                    type: string
                    example: "No course found with id: invalid-course"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          description: IPFS pinning service not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Service unavailable
                  message:
                    type: string
                    example: IPFS pinning service is not configured. Please contact the
                      administrator.
  /api/donors/{address}/impact:
    get:
      tags:
        - Donors
      summary: Get donor impact statistics
      description: Returns impact metrics for a specific donor including total
        donated, scholars funded, milestones completed by funded scholars, and
        average completion rate
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
          description: Donor's Stellar wallet address
      responses:
        "200":
          description: Donor impact statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_donated_usdc:
                    type: string
                    description: Total USDC donated by this donor (in stroops)
                    example: "500000000"
                  scholars_funded:
                    type: integer
                    description: Number of unique scholars funded by this donor
                    example: 5
                  milestones_completed:
                    type: integer
                    description: Total milestones completed by scholars funded by this donor
                    example: 12
                  average_completion_rate:
                    type: number
                    format: float
                    description: Average milestone completion rate for scholars funded by this donor
                      (0-1)
                    example: 0.85
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          description: Treasury contract not configured
  /api/enrollments:
    post:
      tags:
        - Enrollments
      summary: Create a new course enrollment
      description: |
        Records a course enrollment in the database after validating
        the on-chain enrollment via the CourseMilestone contract.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

          content:
            application/json:
              schema:
                type: object
                properties:
                  cid:
                    type: string
                    example: bafybeigdyrzt5sfp7udm7hu76uh7y26nf3efuylqabf3oclgtqy55fbzdi
                  gatewayUrl:
                    type: string
                    example: https://gateway.pinata.cloud/ipfs/bafybei...
